<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Podologico</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    aspect-ratio: 5 / 1;
    justify-content: center;
  }
  header h1 { font-size: 126px; font-weight: 800; letter-spacing: 1px; }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .message {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    word-wrap: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .message.user {
    align-self: flex-end;
    background: #1a73e8;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .message.bot {
    align-self: flex-start;
    background: #e4e6eb;
    color: #1c1c1e;
    border-bottom-left-radius: 4px;
  }
  .message.error {
    align-self: flex-start;
    background: #ffeaea;
    color: #c62828;
    border-bottom-left-radius: 4px;
  }
  .input-area {
    background: #fff;
    border-top: 1px solid #ddd;
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 24px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus { border-color: #1a73e8; }
  .input-area button {
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 46px;
    height: 46px;
    font-size: 20px;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .input-area button:hover:not(:disabled) { background: #1557b0; }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  .typing {
    align-self: flex-start;
    background: #e4e6eb;
    color: #888;
    padding: 12px 20px;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    font-size: 14px;
    animation: fadeIn 0.2s ease;
  }
  .typing::after { content: "..."; animation: dots 1.2s steps(3, end) infinite; }
  @keyframes dots { 0% { content: "."; } 33% { content: ".."; } 66% { content: "..."; } }
  @media (max-width: 600px) {
    .message { max-width: 90%; }
    header { padding: 12px 16px; }
    .chat { padding: 16px 12px; }
  }
</style>
</head>
<body>
<header>
  <h1>Chat Podologico</h1>
</header>
<div class="chat" id="chat"></div>
<div class="input-area">
  <input type="text" id="input" placeholder="Escribe tu consulta..." autofocus>
  <button id="send" aria-label="Enviar">➤</button>
</div>
<script>
const API_URL = "https://nano-rag-server.onrender.com/chat";
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typing-indicator";
  div.textContent = "El asistente está escribiendo";
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

function setLoading(loading) {
  sendBtn.disabled = loading;
  inputEl.disabled = loading;
  if (loading) inputEl.blur();
  else inputEl.focus();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = "";
  addMessage(text, "user");
  setLoading(true);
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pregunta: text })
    });
    if (!res.ok) throw new Error("Error " + res.status + ": " + res.statusText);
    const data = await res.json();
    removeTyping();
    addMessage(data.respuesta || "(respuesta vacía)", "bot");
  } catch (err) {
    removeTyping();
    addMessage("Error de conexión: " + err.message, "error");
  } finally {
    setLoading(false);
  }
}

sendBtn.addEventListener("click", sendMessage);
inputEl.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
